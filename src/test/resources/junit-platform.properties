# Force sequential test execution across ALL runner classes.
#
# KARATE_FAILURE_ANALYSIS.md (root cause A): the server's JWT verifier is not
# thread-safe and intermittently returns 401 on valid, authenticated requests
# under concurrent load. Each Runner already uses .parallel(1), but when JUnit
# runs the Runner *classes* concurrently (e.g. selecting several in the IDE, or
# a parallel build) multiple requests still hit the server at once and trigger
# the flaky 401s. Disabling JUnit parallelism keeps a single request in flight
# at a time and neutralizes them from the test side.
#
# (The underlying non-thread-safe verifier is still a server-side defect to fix.)
junit.jupiter.execution.parallel.enabled=false
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=same_thread
